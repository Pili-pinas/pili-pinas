name: Daily scrape

on:
  schedule:
    - cron: "0 1 * * *"  # 01:00 UTC = 09:00 Philippine Time (UTC+8)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    name: Scrape and embed
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wake API
        run: |
          for i in $(seq 1 12); do
            if curl -sf "$API_URL/health"; then
              echo "API is up after attempt $i"
              exit 0
            fi
            echo "Waiting for machine to start... ($i/12)"
            sleep 15
          done
          echo "API did not come up after 3 minutes — aborting"
          exit 1
        env:
          API_URL: ${{ vars.PILI_PINAS_API_URL }}

      - name: Trigger scrape job
        run: |
          _wait_for_api() {
            for i in $(seq 1 20); do
              if curl -sf "$API_URL/health" > /dev/null; then
                return 0
              fi
              echo "  waiting for API... ($i/20)"
              sleep 15
            done
            return 1
          }

          _trigger_job() {
            local resume="$1"
            curl -sf -X POST "$API_URL/scrape" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: $API_KEY" \
              -d "{\"sources\": [\"news\", \"senate_bills\", \"senators\"], \"max_news\": 30, \"embed\": true, \"resume\": $resume}"
          }

          _poll_job() {
            local job_id="$1"
            # Poll until done (max 30 min)
            for i in $(seq 1 60); do
              sleep 30
              HTTP_CODE=$(curl -s -o /tmp/scrape_status.json -w "%{http_code}" \
                "$API_URL/scrape/$job_id" -H "X-API-Key: $API_KEY")
              STATUS=$(cat /tmp/scrape_status.json)
              echo "[$i] http=$HTTP_CODE raw: $STATUS"
              if [[ "$HTTP_CODE" == "404" || "$HTTP_CODE" == "503" ]]; then
                echo "Container unavailable (http=$HTTP_CODE) — will resume"
                return 2
              fi
              STATE=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "parse_error")
              echo "[$i] status: $STATE"
              if [[ "$STATE" == "done" ]]; then
                echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print('chunks:', d.get('stats',{}))"
                return 0
              elif [[ "$STATE" == "failed" ]]; then
                echo "Scrape job failed: $STATUS"
                return 1
              fi
            done
            echo "Timed out waiting for scrape job"
            return 1
          }

          # First attempt (resume=false)
          JOB=$(_trigger_job false)
          echo "Job started: $JOB"
          JOB_ID=$(echo "$JOB" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          _poll_job "$JOB_ID"
          POLL_RC=$?

          # Retry up to 3 times if container crashes (404 = job lost, 503 = temporarily unavailable)
          RESTART_COUNT=0
          while [[ "$POLL_RC" == "2" && "$RESTART_COUNT" -lt 3 ]]; do
            RESTART_COUNT=$((RESTART_COUNT + 1))
            echo "Container restart detected (attempt $RESTART_COUNT/3) — waiting for API to come back..."
            sleep 30
            if ! _wait_for_api; then
              echo "API did not recover after container restart — aborting"
              exit 1
            fi
            JOB=$(_trigger_job true)
            echo "Resume job started: $JOB"
            JOB_ID=$(echo "$JOB" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
            _poll_job "$JOB_ID"
            POLL_RC=$?
          done

          exit $POLL_RC
        env:
          API_URL: ${{ vars.PILI_PINAS_API_URL }}
          API_KEY: ${{ secrets.PILI_PINAS_API_KEY }}

