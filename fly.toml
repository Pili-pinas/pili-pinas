# fly.toml app configuration file generated for pili-pinas-api on 2026-02-24T23:54:45+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pili-pinas-api'
primary_region = 'sin'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  VECTOR_STORE_BACKEND = 'chroma'

[[mounts]]
  source = 'vector_db'
  destination = '/app/vector_db'
  initial_size = '3gb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
